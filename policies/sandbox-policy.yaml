# Full sandbox policy for my-assistant
# Contains ALL network rules for the sandbox. openshell policy set REPLACES the entire
# policy — never edit individual sections without re-applying the full file.
#
# To apply:
#   openshell policy set my-assistant --policy policies/sandbox-policy.yaml --wait
#
# To sync from live sandbox after openshell term approvals add new rules:
#   openshell policy get my-assistant --full
#   (copy network_policies section back here manually)
#
# Last applied: 2026-04-12 (version number resets on each new sandbox — always apply after onboard)
# Note: allowed_ips in allow_openshell_* is a k3s service IP — may differ between environments

version: 1

filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
    - /sandbox/.openclaw
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /sandbox/.openclaw-data
    - /sandbox/.openclaw/credentials
    - /sandbox/.openclaw/telegram

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  allow_openshell_openshell_svc_cluster_local_8080:
    name: allow_openshell_openshell_svc_cluster_local_8080
    endpoints:
      - host: openshell.openshell.svc.cluster.local
        port: 8080
        allowed_ips:
          - 10.43.168.186   # k3s service IP — verify with: kubectl get svc -n openshell
    binaries:
      - { path: /usr/bin/curl }

  claude_code:
    name: claude_code
    endpoints:
      - host: api.anthropic.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: statsig.anthropic.com
        port: 443
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: sentry.io
        port: 443
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/claude }

  nvidia:
    name: nvidia
    endpoints:
      - host: integrate.api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
      - host: inference-api.nvidia.com
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/claude }
      - { path: /usr/local/bin/openclaw }

  github:
    name: github
    endpoints:
      - host: github.com
        port: 443
        access: full
      - host: api.github.com
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/gh }
      - { path: /usr/bin/git }

  clawhub:
    name: clawhub
    endpoints:
      - host: clawhub.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/node }

  openclaw_api:
    name: openclaw_api
    endpoints:
      - host: openclaw.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  openclaw_docs:
    name: openclaw_docs
    endpoints:
      - host: docs.openclaw.ai
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/local/bin/openclaw }

  npm_registry:
    name: npm_registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/npm }
      - { path: /usr/local/bin/node }

  pypi:
    name: pypi
    endpoints:
      - host: pypi.org
        port: 443
        access: full
      - host: files.pythonhosted.org
        port: 443
        access: full
    binaries:
      - { path: /usr/bin/python3* }
      - { path: /usr/bin/pip* }
      - { path: /usr/local/bin/python3* }
      - { path: /usr/local/bin/pip* }
      - { path: /sandbox/.venv/bin/python* }
      - { path: /sandbox/.venv/bin/pip* }
      - { path: /sandbox/.uv/python/**/python* }
      - { path: /sandbox/.local/bin/pip* }

  npm_yarn:
    name: npm_yarn
    endpoints:
      - host: registry.npmjs.org
        port: 443
        access: full
      - host: registry.yarnpkg.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/npm* }
      - { path: /usr/local/bin/npx* }
      - { path: /usr/local/bin/node* }
      - { path: /usr/local/bin/yarn* }
      - { path: /usr/bin/npm* }
      - { path: /usr/bin/node* }

  discord:
    name: discord
    endpoints:
      - host: discord.com
        port: 443
        access: full
      - host: gateway.discord.gg
        port: 443
        access: full
      - host: cdn.discordapp.com
        port: 443
        access: full
    binaries:
      - { path: /usr/local/bin/node }

  searxng:
    name: searxng
    endpoints:
      - host: host.openshell.internal
        port: 8888
        access: full
        allowed_ips:
          - 192.168.65.254   # Docker Desktop host gateway (Mac); Linux/DGX may differ
    binaries:
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/node }
      - { path: /usr/bin/curl }

  telegram:
    name: telegram
    endpoints:
      - host: api.telegram.org
        port: 443
        protocol: rest
        enforcement: enforce
        tls: terminate
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: POST, path: "/**" }
        # access:full was tried but TLS upgrade fails (socket closes mid-handshake) for all clients.
        # Note: openshell term approvals create allow_api_telegram_org_443 (access:full) that
        # OVERRIDES this — do not approve Telegram in openshell term, or re-apply this policy after.
    binaries:
      - { path: /usr/local/bin/node }
      - { path: /usr/local/bin/openclaw }
      - { path: /usr/local/bin/openclaw-gateway }
      - { path: /usr/bin/curl }
      - { path: /usr/bin/python3* }
